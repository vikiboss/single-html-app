<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <link rel="preconnect" href="https://cdn.tailwindcss.com" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>贪吃蛇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --bg: #09090b;
        --bg-raised: #18181b;
        --bg-overlay: #27272a;
        --fg: #f4f4f5;
        --fg-muted: #a1a1aa;
        --border: #3f3f46;
        --accent: #22c55e;
        --accent-dim: #16a34a;
        --food: #f43f5e;
        --radius: 6px;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f4f4f5;
          --bg-raised: #ffffff;
          --bg-overlay: #e4e4e7;
          --fg: #09090b;
          --fg-muted: #71717a;
          --border: #d4d4d8;
          --accent: #16a34a;
          --accent-dim: #15803d;
          --food: #e11d48;
        }
      }

      /* Manual theme overrides */
      html[data-theme="dark"] {
        --bg: #09090b;
        --bg-raised: #18181b;
        --bg-overlay: #27272a;
        --fg: #f4f4f5;
        --fg-muted: #a1a1aa;
        --border: #3f3f46;
        --accent: #22c55e;
        --accent-dim: #16a34a;
        --food: #f43f5e;
      }
      html[data-theme="light"] {
        --bg: #f4f4f5;
        --bg-raised: #ffffff;
        --bg-overlay: #e4e4e7;
        --fg: #09090b;
        --fg-muted: #71717a;
        --border: #d4d4d8;
        --accent: #16a34a;
        --accent-dim: #15803d;
        --food: #e11d48;
      }

      @keyframes pop {
        0% { transform: scale(1); }
        50% { transform: scale(1.08); }
        100% { transform: scale(1); }
      }
      .pop { animation: pop 0.15s ease-out; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .fade-in { animation: fadeIn 0.25s ease-out both; }

      /* 禁止横向侧滑触发浏览器返回/前进手势，以及 iOS 弹性滚动 */
      html, body { overscroll-behavior: none; touch-action: manipulation; }
    </style>
  </head>
  <body class="bg-[var(--bg)] text-[var(--fg)] min-h-screen flex items-center justify-center p-4">
    <div class="flex flex-col items-center gap-4 w-full max-w-md">
      <!-- Header -->
      <div class="w-full flex items-center justify-between">
        <div class="w-8"></div>
        <h1 class="text-base font-semibold tracking-tight">贪吃蛇</h1>
        <button id="theme-toggle" title="切换明暗主题" class="w-8 h-8 flex items-center justify-center rounded-md bg-[var(--bg-raised)] border border-[var(--border)] text-[var(--fg-muted)] hover:text-[var(--fg)] transition-colors"></button>
      </div>

      <!-- Stats -->
      <div class="w-full grid grid-cols-3 gap-2">
        <div class="bg-[var(--bg-raised)] border border-[var(--border)] rounded-md p-3 text-center">
          <div class="text-xs text-[var(--fg-muted)] mb-1">分数</div>
          <div id="score" class="text-xl font-mono font-bold tabular-nums">0</div>
        </div>
        <div class="bg-[var(--bg-raised)] border border-[var(--border)] rounded-md p-3 text-center">
          <div class="text-xs text-[var(--fg-muted)] mb-1">最高分</div>
          <div id="best" class="text-xl font-mono font-bold tabular-nums text-[var(--accent)]">0</div>
        </div>
        <div class="bg-[var(--bg-raised)] border border-[var(--border)] rounded-md p-3 text-center">
          <div class="text-xs text-[var(--fg-muted)] mb-1">等级</div>
          <div id="level" class="text-xl font-mono font-bold tabular-nums">1</div>
        </div>
      </div>

      <!-- Canvas -->
      <div class="relative w-full" id="canvas-wrap">
        <canvas id="canvas" class="block w-full rounded-md border border-[var(--border)]"></canvas>

        <!-- Overlay -->
        <div id="overlay" class="absolute inset-0 flex flex-col items-center justify-center rounded-md bg-zinc-950/85 backdrop-blur-sm fade-in">
          <div id="overlay-icon" class="text-4xl mb-3 select-none">🐍</div>
          <div id="overlay-title" class="text-xl font-bold mb-1">贪吃蛇</div>
          <div id="overlay-sub" class="text-[var(--fg-muted)] text-sm mb-6 text-center px-4">吃到食物得 1 分，撞墙或咬到自己即结束</div>
          <button id="start-btn" class="px-6 py-2 bg-[var(--accent)] hover:bg-[var(--accent-dim)] active:scale-95 text-white rounded font-medium transition-all text-sm">
            开始游戏
          </button>
          <div class="mt-4 text-[var(--fg-muted)] text-xs hidden sm:block">← → ↑ ↓ 或 WASD 控制 &nbsp;·&nbsp; 空格暂停</div>
        </div>

        <!-- Pause badge -->
        <div id="pause-badge" class="hidden absolute top-2 right-2 bg-zinc-900/80 backdrop-blur-sm border border-[var(--border)] rounded px-2 py-1 text-xs text-[var(--fg-muted)]">
          已暂停
        </div>
      </div>

      <!-- Mobile D-pad -->
      <div class="grid grid-cols-3 gap-2 w-36">
        <div></div>
        <button data-dir="up" class="dpad-btn bg-[var(--bg-raised)] border border-[var(--border)] rounded-md h-10 flex items-center justify-center active:bg-[var(--bg-overlay)] active:scale-95 transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 15l7-7 7 7"/></svg>
        </button>
        <div></div>
        <button data-dir="left" class="dpad-btn bg-[var(--bg-raised)] border border-[var(--border)] rounded-md h-10 flex items-center justify-center active:bg-[var(--bg-overlay)] active:scale-95 transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <button data-dir="down" class="dpad-btn bg-[var(--bg-raised)] border border-[var(--border)] rounded-md h-10 flex items-center justify-center active:bg-[var(--bg-overlay)] active:scale-95 transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <button data-dir="right" class="dpad-btn bg-[var(--bg-raised)] border border-[var(--border)] rounded-md h-10 flex items-center justify-center active:bg-[var(--bg-overlay)] active:scale-95 transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>

    <script type="module">
      // ─── Theme Toggle ─────────────────────────────────────────────────────────
      const _html = document.documentElement
      _html.dataset.theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
      document.getElementById('theme-toggle').addEventListener('click', () => {
        _html.dataset.theme = _html.dataset.theme === 'dark' ? 'light' : 'dark'
        _updateThemeIcon()
      })
      function _updateThemeIcon() {
        const isDark = _html.dataset.theme === 'dark'
        document.getElementById('theme-toggle').innerHTML = isDark
          ? `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`
          : `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`
      }
      _updateThemeIcon()

      const COLS = 20
      const ROWS = 20

      const canvas = document.getElementById('canvas')
      const ctx = canvas.getContext('2d')
      const scoreEl = document.getElementById('score')
      const bestEl = document.getElementById('best')
      const levelEl = document.getElementById('level')
      const overlay = document.getElementById('overlay')
      const overlayIcon = document.getElementById('overlay-icon')
      const overlayTitle = document.getElementById('overlay-title')
      const overlaySub = document.getElementById('overlay-sub')
      const startBtn = document.getElementById('start-btn')
      const pauseBadge = document.getElementById('pause-badge')

      // Responsive cell size
      let CELL = 20
      function resize() {
        const wrap = document.getElementById('canvas-wrap')
        const w = wrap.clientWidth
        CELL = Math.floor(w / COLS)
        canvas.width = COLS * CELL
        canvas.height = ROWS * CELL
        if (snake) draw()
      }
      window.addEventListener('resize', resize)

      // Game state
      let snake, dir, nextDir, food, score, gameLoop, running, paused
      let best = parseInt(localStorage.getItem('snake-best') || '0')
      bestEl.textContent = best

      const SPEEDS = [180, 160, 140, 120, 105, 90, 78, 67, 57, 48]
      const getSpeed = s => SPEEDS[Math.min(Math.floor(s / 5), SPEEDS.length - 1)]
      const getLevel = s => Math.min(Math.floor(s / 5) + 1, 10)

      function randomFood() {
        const free = []
        for (let x = 0; x < COLS; x++)
          for (let y = 0; y < ROWS; y++)
            if (!snake.some(s => s.x === x && s.y === y)) free.push({ x, y })
        return free[Math.floor(Math.random() * free.length)]
      }

      function cssVar(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim()
      }

      function roundRect(x, y, w, h, r) {
        ctx.beginPath()
        ctx.moveTo(x + r, y)
        ctx.lineTo(x + w - r, y)
        ctx.quadraticCurveTo(x + w, y, x + w, y + r)
        ctx.lineTo(x + w, y + h - r)
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h)
        ctx.lineTo(x + r, y + h)
        ctx.quadraticCurveTo(x, y + h, x, y + h - r)
        ctx.lineTo(x, y + r)
        ctx.quadraticCurveTo(x, y, x + r, y)
        ctx.closePath()
      }

      function draw() {
        const bgRaised = cssVar('--bg-raised')
        const border = cssVar('--border')
        const accent = cssVar('--accent')
        const accentDim = cssVar('--accent-dim')
        const food_ = cssVar('--food')

        // Background
        ctx.fillStyle = bgRaised
        ctx.fillRect(0, 0, canvas.width, canvas.height)

        // Grid dots
        ctx.fillStyle = border
        ctx.globalAlpha = 0.5
        for (let x = 1; x < COLS; x++) {
          for (let y = 1; y < ROWS; y++) {
            ctx.fillRect(x * CELL - 0.5, y * CELL - 0.5, 1, 1)
          }
        }
        ctx.globalAlpha = 1

        // Food
        const fx = food.x * CELL + CELL / 2
        const fy = food.y * CELL + CELL / 2
        const fr = CELL * 0.32
        // Outer glow
        const grd = ctx.createRadialGradient(fx, fy, 0, fx, fy, CELL * 0.7)
        grd.addColorStop(0, food_ + '55')
        grd.addColorStop(1, 'transparent')
        ctx.fillStyle = grd
        ctx.beginPath()
        ctx.arc(fx, fy, CELL * 0.7, 0, Math.PI * 2)
        ctx.fill()
        // Core
        ctx.shadowColor = food_
        ctx.shadowBlur = 8
        ctx.fillStyle = food_
        ctx.beginPath()
        ctx.arc(fx, fy, fr, 0, Math.PI * 2)
        ctx.fill()
        // Highlight
        ctx.shadowBlur = 0
        ctx.fillStyle = 'rgba(255,255,255,0.4)'
        ctx.beginPath()
        ctx.arc(fx - fr * 0.3, fy - fr * 0.3, fr * 0.35, 0, Math.PI * 2)
        ctx.fill()

        // Snake body (back to front so head renders on top)
        for (let i = snake.length - 1; i >= 0; i--) {
          const seg = snake[i]
          const t = i / (snake.length - 1 || 1)
          const x = seg.x * CELL + 2
          const y = seg.y * CELL + 2
          const size = CELL - 4

          if (i === 0) {
            ctx.shadowColor = accent
            ctx.shadowBlur = 10
            ctx.fillStyle = accent
          } else {
            ctx.shadowBlur = 0
            ctx.globalAlpha = Math.max(0.35, 1 - t * 0.6)
            // Interpolate accent → accentDim
            ctx.fillStyle = accentDim
          }

          roundRect(x, y, size, size, i === 0 ? 5 : 3)
          ctx.fill()
          ctx.globalAlpha = 1
          ctx.shadowBlur = 0

          // Segment divider lines on body
          if (i > 0 && i < snake.length - 1) {
            const next = snake[i + 1]
            if (next.x === seg.x) {
              // vertical neighbor
              const lineY = seg.y < next.y ? seg.y * CELL + CELL - 1 : seg.y * CELL
              ctx.fillStyle = bgRaised
              ctx.globalAlpha = 0.25
              ctx.fillRect(seg.x * CELL + 3, lineY, CELL - 6, 1)
              ctx.globalAlpha = 1
            } else {
              const lineX = seg.x < next.x ? seg.x * CELL + CELL - 1 : seg.x * CELL
              ctx.fillStyle = bgRaised
              ctx.globalAlpha = 0.25
              ctx.fillRect(lineX, seg.y * CELL + 3, 1, CELL - 6)
              ctx.globalAlpha = 1
            }
          }
        }

        // Eyes on head
        const head = snake[0]
        ctx.fillStyle = 'rgba(0,0,0,0.7)'
        const es = Math.max(2, CELL * 0.1)
        const em = Math.floor(CELL * 0.28)
        if (dir.x === 1) {
          ctx.beginPath(); ctx.arc(head.x * CELL + CELL - em, head.y * CELL + em, es, 0, Math.PI * 2); ctx.fill()
          ctx.beginPath(); ctx.arc(head.x * CELL + CELL - em, head.y * CELL + CELL - em, es, 0, Math.PI * 2); ctx.fill()
        } else if (dir.x === -1) {
          ctx.beginPath(); ctx.arc(head.x * CELL + em, head.y * CELL + em, es, 0, Math.PI * 2); ctx.fill()
          ctx.beginPath(); ctx.arc(head.x * CELL + em, head.y * CELL + CELL - em, es, 0, Math.PI * 2); ctx.fill()
        } else if (dir.y === -1) {
          ctx.beginPath(); ctx.arc(head.x * CELL + em, head.y * CELL + em, es, 0, Math.PI * 2); ctx.fill()
          ctx.beginPath(); ctx.arc(head.x * CELL + CELL - em, head.y * CELL + em, es, 0, Math.PI * 2); ctx.fill()
        } else {
          ctx.beginPath(); ctx.arc(head.x * CELL + em, head.y * CELL + CELL - em, es, 0, Math.PI * 2); ctx.fill()
          ctx.beginPath(); ctx.arc(head.x * CELL + CELL - em, head.y * CELL + CELL - em, es, 0, Math.PI * 2); ctx.fill()
        }
      }

      function init() {
        const mx = Math.floor(COLS / 2)
        const my = Math.floor(ROWS / 2)
        snake = [{ x: mx, y: my }, { x: mx - 1, y: my }, { x: mx - 2, y: my }]
        dir = { x: 1, y: 0 }
        nextDir = { x: 1, y: 0 }
        score = 0
        food = randomFood()
        scoreEl.textContent = 0
        levelEl.textContent = 1
      }

      function step() {
        dir = { ...nextDir }
        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y }

        if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver()
        if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver()

        snake.unshift(head)

        if (head.x === food.x && head.y === food.y) {
          score++
          scoreEl.textContent = score
          scoreEl.parentElement.classList.remove('pop')
          void scoreEl.parentElement.offsetWidth
          scoreEl.parentElement.classList.add('pop')
          levelEl.textContent = getLevel(score)
          if (score > best) {
            best = score
            bestEl.textContent = best
            localStorage.setItem('snake-best', best)
          }
          food = randomFood()
          clearInterval(gameLoop)
          gameLoop = setInterval(tick, getSpeed(score))
        } else {
          snake.pop()
        }

        draw()
      }

      function tick() { if (!paused) step() }

      function gameOver() {
        clearInterval(gameLoop)
        running = false
        overlayIcon.textContent = '💀'
        overlayTitle.textContent = '游戏结束'
        const isRecord = score > 0 && score === best
        overlaySub.textContent = `得分 ${score} 分${isRecord ? ' · 新纪录！🎉' : ''}`
        startBtn.textContent = '再来一局'
        overlay.classList.remove('hidden')
        overlay.classList.remove('fade-in')
        void overlay.offsetWidth
        overlay.classList.add('fade-in')
      }

      function startGame() {
        resize()
        init()
        running = true
        paused = false
        pauseBadge.classList.add('hidden')
        overlay.classList.add('hidden')
        clearInterval(gameLoop)
        gameLoop = setInterval(tick, getSpeed(0))
        draw()
      }

      startBtn.addEventListener('click', startGame)

      // Keyboard
      document.addEventListener('keydown', e => {
        const map = {
          ArrowUp: { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
          ArrowDown: { x: 0, y: 1 }, s: { x: 0, y: 1 }, S: { x: 0, y: 1 },
          ArrowLeft: { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
          ArrowRight: { x: 1, y: 0 }, d: { x: 1, y: 0 }, D: { x: 1, y: 0 },
        }
        const nd = map[e.key]
        if (nd) {
          e.preventDefault()
          if (!running) return
          if (nd.x === -dir.x && nd.y === -dir.y) return // no reversing
          nextDir = nd
          if (paused) {
            paused = false
            pauseBadge.classList.add('hidden')
          }
        }
        if (e.key === ' ') {
          e.preventDefault()
          if (!running) return
          paused = !paused
          pauseBadge.classList.toggle('hidden', !paused)
        }
      })

      // D-pad
      document.querySelectorAll('.dpad-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!running) return
          const dirMap = { up: { x: 0, y: -1 }, down: { x: 0, y: 1 }, left: { x: -1, y: 0 }, right: { x: 1, y: 0 } }
          const nd = dirMap[btn.dataset.dir]
          if (nd.x === -dir.x && nd.y === -dir.y) return
          nextDir = nd
          if (paused) {
            paused = false
            pauseBadge.classList.add('hidden')
          }
        })
      })

      // Touch swipe on canvas
      let touchStart = null
      canvas.addEventListener('touchstart', e => {
        touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }
        e.preventDefault()
      }, { passive: false })
      canvas.addEventListener('touchmove', e => {
        e.preventDefault()  // 阻断拖动期间的侧滑返回手势
      }, { passive: false })
      canvas.addEventListener('touchend', e => {
        if (!touchStart || !running) return
        const dx = e.changedTouches[0].clientX - touchStart.x
        const dy = e.changedTouches[0].clientY - touchStart.y
        if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return
        let nd
        if (Math.abs(dx) > Math.abs(dy)) nd = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 }
        else nd = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 }
        if (nd.x === -dir.x && nd.y === -dir.y) return
        nextDir = nd
        touchStart = null
        e.preventDefault()
      }, { passive: false })

      // Init
      resize()
      init()
      draw()
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link rel="preconnect" href="https://esm.sh">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>盘古之白 — 排版格式化</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #0c0c0e;
      --surface: #161618;
      --surface-2: #1c1c1f;
      --border: #27272a;
      --border-subtle: #1f1f22;
      --text: #e4e4e7;
      --text-muted: #71717a;
      --text-faint: #3f3f46;
      --accent: #a78bfa;
      --accent-faint: rgba(167, 139, 250, 0.14);
      --accent-border: rgba(167, 139, 250, 0.55);
    }
    body {
      background: var(--bg);
      color: var(--text);
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.055;
      pointer-events: none;
      z-index: 9999;
    }
    textarea, .diff-text {
      font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.8;
      color: var(--text);
    }
    textarea {
      resize: none;
      outline: none;
      background: transparent;
    }
    textarea::placeholder {
      color: var(--text-faint);
    }
    textarea::-webkit-scrollbar { width: 6px; }
    textarea::-webkit-scrollbar-track { background: transparent; }
    textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .diff-view::-webkit-scrollbar { width: 6px; }
    .diff-view::-webkit-scrollbar-track { background: transparent; }
    .diff-view::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .added-mark {
      display: inline-block;
      min-width: 5px;
      background: var(--accent-faint);
      border-bottom: 1.5px solid var(--accent-border);
      border-radius: 1px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }
    .panel:focus-within {
      border-color: rgba(167, 139, 250, 0.35);
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.07);
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .panel-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 16px;
      border-top: 1px solid var(--border-subtle);
    }
    .editor-body {
      height: 300px;
      overflow-y: auto;
      padding: 12px 16px;
    }
    .icon-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-muted);
      padding: 3px 6px;
      border-radius: 4px;
      transition: color 150ms ease, background 150ms ease;
      cursor: pointer;
    }
    .icon-btn:hover {
      color: var(--text);
      background: var(--surface-2);
    }
    .tab-base {
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 4px;
      transition: background 150ms ease, color 150ms ease;
      cursor: pointer;
    }
    .tab-active {
      background: #fff;
      color: #09090b;
    }
    .tab-inactive {
      color: var(--text-muted);
    }
    .tab-inactive:hover {
      color: var(--text);
      background: var(--surface-2);
    }
    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 4px;
    }
    .badge-clean {
      color: #4ade80;
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.2);
    }
    .badge-changes {
      color: var(--accent);
      background: var(--accent-faint);
      border: 1px solid rgba(167, 139, 250, 0.25);
    }
    .copy-success {
      color: #4ade80 !important;
    }
    .rule-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
    }
    code {
      font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      font-size: 11px;
      padding: 1px 5px;
      border-radius: 3px;
    }
    code.before {
      background: rgba(255,255,255,0.06);
      color: #a1a1aa;
    }
    code.after {
      background: var(--accent-faint);
      color: var(--accent);
    }
  </style>
</head>
<body class="min-h-screen">

  <div class="max-w-5xl mx-auto px-4 sm:px-6 py-10 sm:py-14">

    <!-- Header -->
    <header class="mb-8">
      <div class="flex items-center gap-2.5 mb-2">
        <div class="w-7 h-7 rounded flex items-center justify-center" style="background: #7c3aed">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h10" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg>
        </div>
        <h1 class="text-lg font-bold tracking-tight">盘古之白</h1>
        <span class="text-xs font-medium px-2 py-0.5 rounded" style="color: var(--text-muted); background: var(--surface-2)">排版格式化</span>
      </div>
      <p class="text-sm" style="color: var(--text-muted)">自动在中文与英文、数字之间插入空格，提升文字排版的视觉体验。</p>
    </header>

    <!-- Mode tabs -->
    <div class="flex items-center gap-1 mb-4">
      <button id="tab-format" class="tab-base tab-active">格式化</button>
      <button id="tab-diff" class="tab-base tab-inactive">差异对比</button>
    </div>

    <!-- Two-panel editor -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

      <!-- Input panel -->
      <div class="panel">
        <div class="panel-header">
          <span class="text-xs font-medium uppercase tracking-wider" style="color: var(--text-faint)">输入</span>
          <button id="btn-clear" class="icon-btn">
            <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            清空
          </button>
        </div>
        <textarea
          id="input"
          class="editor-body w-full"
          placeholder="在此粘贴需要格式化的文字&#10;&#10;示例：我love你，共3条数据，使用Vue开发。"
          spellcheck="false"
        ></textarea>
        <div class="panel-footer">
          <span id="input-count" class="text-xs" style="color: var(--text-faint)">0 字符</span>
          <button id="btn-paste" class="icon-btn">
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><rect x="1" y="3" width="7" height="8" rx="1.2" stroke="currentColor" stroke-width="1.3"/><path d="M4 3V2a1 1 0 011-1h4a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            粘贴
          </button>
        </div>
      </div>

      <!-- Output panel -->
      <div class="panel">
        <div class="panel-header">
          <div class="flex items-center gap-2">
            <span class="text-xs font-medium uppercase tracking-wider" style="color: var(--text-faint)">输出</span>
            <span id="badge-clean" class="badge badge-clean hidden">规范 ✓</span>
            <span id="badge-changes" class="badge badge-changes hidden">0 处已修正</span>
          </div>
          <button id="btn-copy" class="icon-btn">
            <svg id="copy-icon" width="11" height="11" viewBox="0 0 12 12" fill="none"><rect x="1" y="3" width="7" height="8" rx="1.2" stroke="currentColor" stroke-width="1.3"/><path d="M4 3V2a1 1 0 011-1h4a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            <span id="copy-label">复制</span>
          </button>
        </div>

        <!-- Format view -->
        <textarea
          id="output"
          class="editor-body w-full"
          readonly
          placeholder="格式化结果将在此显示…"
          spellcheck="false"
        ></textarea>

        <!-- Diff view -->
        <div id="diff-view" class="editor-body diff-view hidden">
          <div id="diff-content" class="diff-text whitespace-pre-wrap break-words" style="color: var(--text-faint)">差异将在此显示…</div>
        </div>

        <div class="panel-footer">
          <span id="output-count" class="text-xs" style="color: var(--text-faint)">0 字符</span>
          <span id="diff-legend" class="hidden text-xs flex items-center gap-1.5" style="color: var(--text-faint)">
            <span class="inline-block w-3 h-3 rounded-sm" style="background: var(--accent-faint); border-bottom: 1.5px solid var(--accent-border)"></span>
            紫色底纹为新增空格
          </span>
        </div>
      </div>
    </div>

    <!-- Rule reference -->
    <div class="mt-5 grid grid-cols-1 sm:grid-cols-3 gap-3">
      <div class="rule-card">
        <div class="text-xs font-semibold mb-2" style="color: var(--text-muted)">中文 ↔ 英文</div>
        <div class="text-xs space-y-1.5" style="color: var(--text-faint)">
          <div><code class="before">我love你</code><span class="mx-1.5" style="color: var(--text-faint)">→</span><code class="after">我 love 你</code></div>
          <div><code class="before">使用React构建</code><span class="mx-1.5" style="color: var(--text-faint)">→</span><code class="after">使用 React 构建</code></div>
        </div>
      </div>
      <div class="rule-card">
        <div class="text-xs font-semibold mb-2" style="color: var(--text-muted)">中文 ↔ 数字</div>
        <div class="text-xs space-y-1.5" style="color: var(--text-faint)">
          <div><code class="before">共3条数据</code><span class="mx-1.5" style="color: var(--text-faint)">→</span><code class="after">共 3 条数据</code></div>
          <div><code class="before">版本1.0发布</code><span class="mx-1.5" style="color: var(--text-faint)">→</span><code class="after">版本 1.0 发布</code></div>
        </div>
      </div>
      <div class="rule-card">
        <div class="text-xs font-semibold mb-2" style="color: var(--text-muted)">全角标点边界</div>
        <div class="text-xs space-y-1.5" style="color: var(--text-faint)">
          <div><code class="before">「hello」world</code><span class="mx-1.5" style="color: var(--text-faint)">→</span><code class="after">「hello」 world</code></div>
          <div><code class="before">（test）完成</code><span class="mx-1.5" style="color: var(--text-faint)">→</span><code class="after">（test）完成</code></div>
        </div>
      </div>
    </div>

    <footer class="mt-10 pt-5" style="border-top: 1px solid var(--border)">
      <p class="text-xs text-center" style="color: var(--text-faint)">基于 <a href="https://github.com/vinta/pangu.js" target="_blank" rel="noopener" class="underline transition-colors duration-150" style="text-decoration-color: var(--border); color: var(--text-muted)" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-muted)'">pangu.js</a> · 致敬盘古大神，字里行间，正一正间距。</p>
    </footer>
  </div>

  <script type="importmap">
  {
    "imports": {
      "pangu": "https://esm.sh/pangu?bundle"
    }
  }
  </script>

  <script type="module">
    import pangu from 'pangu'

    const inputEl = document.getElementById('input')
    const outputEl = document.getElementById('output')
    const diffView = document.getElementById('diff-view')
    const diffContent = document.getElementById('diff-content')
    const diffLegend = document.getElementById('diff-legend')
    const inputCount = document.getElementById('input-count')
    const outputCount = document.getElementById('output-count')
    const badgeClean = document.getElementById('badge-clean')
    const badgeChanges = document.getElementById('badge-changes')
    const btnCopy = document.getElementById('btn-copy')
    const copyLabel = document.getElementById('copy-label')
    const copyIcon = document.getElementById('copy-icon')
    const btnClear = document.getElementById('btn-clear')
    const btnPaste = document.getElementById('btn-paste')
    const tabFormat = document.getElementById('tab-format')
    const tabDiff = document.getElementById('tab-diff')

    let currentMode = 'format'
    let processedText = ''

    // pangu only inserts spaces, never removes chars — walk both strings to count insertions
    function computeChanges(original, processed) {
      let added = 0
      let i = 0
      for (let j = 0; j < processed.length; j++) {
        if (i < original.length && original[i] === processed[j]) {
          i++
        } else if (processed[j] === ' ') {
          added++
        } else {
          i++
        }
      }
      return added
    }

    function buildDiffHTML(original, processed) {
      const parts = []
      let i = 0
      for (let j = 0; j < processed.length; j++) {
        if (i < original.length && original[i] === processed[j]) {
          parts.push({ ch: processed[j], added: false })
          i++
        } else if (processed[j] === ' ') {
          parts.push({ ch: ' ', added: true })
        } else {
          parts.push({ ch: processed[j], added: false })
          i++
        }
      }

      return parts.map(({ ch, added }) => {
        const safe = ch.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        return added ? `<span class="added-mark">${safe}</span>` : safe
      }).join('')
    }

    function process() {
      const input = inputEl.value
      inputCount.textContent = `${input.length} 字符`

      if (!input) {
        processedText = ''
        outputEl.value = ''
        diffContent.innerHTML = `<span style="color:var(--text-faint)">差异将在此显示…</span>`
        outputCount.textContent = '0 字符'
        badgeClean.classList.add('hidden')
        badgeChanges.classList.add('hidden')
        return
      }

      processedText = pangu.spacingText(input)
      const changes = computeChanges(input, processedText)

      outputEl.value = processedText
      if (currentMode === 'diff') {
        diffContent.innerHTML = buildDiffHTML(input, processedText)
      }

      outputCount.textContent = `${processedText.length} 字符`

      if (changes === 0) {
        badgeClean.classList.remove('hidden')
        badgeChanges.classList.add('hidden')
      } else {
        badgeClean.classList.add('hidden')
        badgeChanges.textContent = `${changes} 处已修正`
        badgeChanges.classList.remove('hidden')
      }
    }

    let debounce
    inputEl.addEventListener('input', () => {
      clearTimeout(debounce)
      debounce = setTimeout(process, 120)
    })

    btnClear.addEventListener('click', () => {
      inputEl.value = ''
      process()
      inputEl.focus()
    })

    btnPaste.addEventListener('click', async () => {
      try {
        const text = await navigator.clipboard.readText()
        inputEl.value = text
        process()
      } catch {
        inputEl.focus()
      }
    })

    btnCopy.addEventListener('click', async () => {
      if (!processedText) return
      try {
        await navigator.clipboard.writeText(processedText)
        copyLabel.textContent = '已复制'
        copyIcon.innerHTML = '<path d="M2 6l3.5 3.5L10 3" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
        btnCopy.classList.add('copy-success')
        setTimeout(() => {
          copyLabel.textContent = '复制'
          copyIcon.innerHTML = '<rect x="1" y="3" width="7" height="8" rx="1.2" stroke="currentColor" stroke-width="1.3"/><path d="M4 3V2a1 1 0 011-1h4a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>'
          btnCopy.classList.remove('copy-success')
        }, 1600)
      } catch {}
    })

    function setMode(mode) {
      currentMode = mode
      const isFormat = mode === 'format'

      if (!isFormat && inputEl.value) {
        diffContent.innerHTML = buildDiffHTML(inputEl.value, processedText)
      }

      outputEl.classList.toggle('hidden', !isFormat)
      diffView.classList.toggle('hidden', isFormat)
      diffLegend.classList.toggle('hidden', isFormat)

      tabFormat.className = `tab-base ${isFormat ? 'tab-active' : 'tab-inactive'}`
      tabDiff.className = `tab-base ${!isFormat ? 'tab-active' : 'tab-inactive'}`
    }

    tabFormat.addEventListener('click', () => setMode('format'))
    tabDiff.addEventListener('click', () => setMode('diff'))
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <link rel="preconnect" href="https://cdn.tailwindcss.com" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>俄罗斯方块</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html,
      body {
        overscroll-behavior: none;
        touch-action: manipulation;
      }
      :root {
        --bg: #09090b;
        --bg-raised: #18181b;
        --bg-overlay: #27272a;
        --fg: #f4f4f5;
        --fg-muted: #a1a1aa;
        --border: #3f3f46;
        --accent: #6366f1;
        --radius: 6px;
        --board-bg: #07070a;
        --board-grid: rgba(255, 255, 255, 0.03);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #ffffff;
          --bg-raised: #f4f4f5;
          --bg-overlay: #e4e4e7;
          --fg: #09090b;
          --fg-muted: #71717a;
          --border: #d4d4d8;
          --accent: #4f46e5;
          --board-bg: #f8fafc;
          --board-grid: rgba(15, 23, 42, 0.08);
        }
      }
      html[data-theme='dark'] {
        --bg: #09090b;
        --bg-raised: #18181b;
        --bg-overlay: #27272a;
        --fg: #f4f4f5;
        --fg-muted: #a1a1aa;
        --border: #3f3f46;
        --accent: #6366f1;
        --board-bg: #07070a;
        --board-grid: rgba(255, 255, 255, 0.03);
      }
      html[data-theme='light'] {
        --bg: #ffffff;
        --bg-raised: #f4f4f5;
        --bg-overlay: #e4e4e7;
        --fg: #09090b;
        --fg-muted: #71717a;
        --border: #d4d4d8;
        --accent: #4f46e5;
        --board-bg: #f8fafc;
        --board-grid: rgba(15, 23, 42, 0.08);
      }
      /* 移动端 canvas 按视口高度自适应，保持 1:2 宽高比 */
      @media (max-width: 639px) {
        #board {
          height: min(600px, calc(100svh - 130px));
          aspect-ratio: 1 / 2;
          width: auto !important;
          display: block;
          margin-left: auto;
          margin-right: auto;
        }
      }
    </style>
  </head>
  <body
    class="bg-[var(--bg)] text-[var(--fg)] min-h-screen flex flex-col items-center justify-center sm:flex-row sm:items-center sm:justify-center p-2 sm:p-4 select-none overflow-x-hidden"
  >
    <!-- Ambient glow -->
    <div class="fixed inset-0 pointer-events-none" aria-hidden="true">
      <div class="absolute top-1/4 -left-20 w-80 h-80 bg-indigo-600/10 rounded-full blur-3xl"></div>
      <div
        class="absolute bottom-1/4 -right-20 w-80 h-80 bg-violet-600/10 rounded-full blur-3xl"
      ></div>
    </div>

    <!-- 移动端：flex-col 整体居中；桌面端：display:contents 透明，子项回到 body flex-row -->
    <div class="flex flex-col gap-2 sm:contents">
      <!-- 移动端悬浮主题切换 -->
      <button
        id="theme-toggle-m"
        title="切换明暗主题"
        class="sm:hidden fixed top-3 right-3 z-50 w-8 h-8 flex items-center justify-center rounded-md bg-[var(--bg-raised)] border border-[var(--border)] text-[var(--fg-muted)] hover:text-[var(--fg)] transition-colors"
      ></button>

      <!-- ── 移动端专属：顶部统计栏 ── -->
      <div
        class="sm:hidden w-full relative flex items-center justify-around bg-[var(--bg-raised)] border border-[var(--border)] rounded-md px-3 py-2"
      >
        <div class="text-center">
          <p class="text-[9px] font-semibold uppercase tracking-widest text-[var(--fg-muted)]">
            分数
          </p>
          <p id="scoreElM" class="text-base font-black text-[var(--accent)] leading-none mt-0.5">
            0
          </p>
        </div>
        <div class="w-px h-7 bg-[var(--border)]"></div>
        <div class="text-center">
          <p class="text-[9px] font-semibold uppercase tracking-widest text-[var(--fg-muted)]">
            最高
          </p>
          <p id="bestElM" class="text-base font-bold text-[var(--fg-muted)] leading-none mt-0.5">
            0
          </p>
        </div>
        <div class="w-px h-7 bg-[var(--border)]"></div>
        <div class="text-center">
          <p class="text-[9px] font-semibold uppercase tracking-widest text-[var(--fg-muted)]">
            等级
          </p>
          <p id="levelElM" class="text-base font-black leading-none mt-0.5">1</p>
        </div>
        <div class="w-px h-7 bg-[var(--border)]"></div>
        <div class="text-center">
          <p class="text-[9px] font-semibold uppercase tracking-widest text-[var(--fg-muted)]">
            消行
          </p>
          <p id="linesElM" class="text-base font-black leading-none mt-0.5">0</p>
        </div>
      </div>

      <!-- ── 游戏主区域：桌面端左右排列，移动端只有画布 ── -->
      <div class="relative flex gap-3 items-stretch">
        <!-- Game board -->
        <div class="relative sm:shrink-0">
          <canvas
            id="board"
            width="300"
            height="600"
            class="rounded-md border border-[var(--border)] block sm:w-[300px] sm:h-[600px]"
          ></canvas>

          <!-- Overlay: start / pause / game over -->
          <div
            id="overlay"
            class="absolute inset-0 rounded-md backdrop-blur-[2px] bg-[var(--bg)]/80 flex flex-col items-center justify-center gap-4"
          >
            <div class="text-center px-6">
              <div
                class="text-5xl font-black tracking-tighter mb-2 bg-gradient-to-br from-indigo-400 to-purple-400 bg-clip-text text-transparent"
              >
                TETRIS
              </div>
              <p id="oMsg" class="text-sm text-[var(--fg-muted)]">经典俄罗斯方块</p>
              <p id="oScore" class="text-2xl font-bold mt-1 text-[var(--accent)]"></p>
            </div>
            <button
              id="startBtn"
              class="bg-[var(--accent)] hover:opacity-90 active:scale-95 text-white font-semibold text-sm px-8 py-2.5 rounded-md transition-all"
            >
              开始游戏
            </button>
            <p class="text-[11px] text-[var(--fg-muted)] sm:block hidden">或按 Space 键</p>
          </div>

          <!-- ── 移动端触控操作区：在 canvas 容器内，宽度自动与画布对齐 ── -->
          <div class="sm:hidden flex gap-2 mt-2">
            <button
              data-tc="left"
              class="flex-1 h-12 bg-[var(--bg-raised)] border border-[var(--border)] rounded-md flex items-center justify-center text-[var(--fg)] active:bg-[var(--bg-overlay)]"
            >
              <svg class="w-5 h-5" viewBox="0 0 20 20" fill="currentColor">
                <path
                  d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z"
                />
              </svg>
            </button>
            <button
              data-tc="rotate"
              class="flex-1 h-12 bg-[var(--bg-raised)] border border-[var(--border)] rounded-md flex items-center justify-center text-[var(--fg)] active:bg-[var(--bg-overlay)]"
            >
              <svg class="w-5 h-5" viewBox="0 0 20 20" fill="currentColor">
                <path
                  fill-rule="evenodd"
                  d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z"
                  clip-rule="evenodd"
                />
              </svg>
            </button>
            <button
              data-tc="right"
              class="flex-1 h-12 bg-[var(--bg-raised)] border border-[var(--border)] rounded-md flex items-center justify-center text-[var(--fg)] active:bg-[var(--bg-overlay)]"
            >
              <svg class="w-5 h-5" viewBox="0 0 20 20" fill="currentColor">
                <path
                  d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"
                />
              </svg>
            </button>
            <button
              data-tc="down"
              class="flex-1 h-12 bg-[var(--bg-raised)] border border-[var(--border)] rounded-md flex items-center justify-center text-[var(--fg)] active:bg-[var(--bg-overlay)]"
            >
              <svg class="w-5 h-5" viewBox="0 0 20 20" fill="currentColor">
                <path
                  fill-rule="evenodd"
                  d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                  clip-rule="evenodd"
                />
              </svg>
            </button>
            <button
              data-tc="drop"
              class="flex-1 h-12 bg-[var(--accent)]/20 border border-[var(--accent)]/40 rounded-md flex items-center justify-center text-[var(--accent)] active:bg-[var(--accent)]/40"
            >
              <svg class="w-5 h-5" viewBox="0 0 20 20" fill="currentColor">
                <path
                  fill-rule="evenodd"
                  d="M3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293 4.293a1 1 0 011.414 0L10 16.586l2.293-2.293a1 1 0 011.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414zM10 3a1 1 0 011 1v9a1 1 0 11-2 0V4a1 1 0 011-1z"
                  clip-rule="evenodd"
                />
              </svg>
            </button>
          </div>
        </div>

        <!-- ── 桌面端专属：右侧面板 ── -->
        <div class="hidden sm:flex flex-col gap-3 w-[130px]">
          <!-- Next piece -->
          <div class="bg-[var(--bg-raised)] border border-[var(--border)] rounded-md p-3">
            <p
              class="text-[10px] font-semibold uppercase tracking-widest text-[var(--fg-muted)] mb-2"
            >
              下一个
            </p>
            <canvas id="preview" width="104" height="80" class="w-full"></canvas>
          </div>

          <!-- Stats -->
          <div class="bg-[var(--bg-raised)] border border-[var(--border)] rounded-md p-3 space-y-3">
            <div>
              <p class="text-[10px] font-semibold uppercase tracking-widest text-[var(--fg-muted)]">
                分数
              </p>
              <p id="scoreEl" class="text-2xl font-black text-[var(--accent)] leading-tight">0</p>
            </div>
            <div>
              <p class="text-[10px] font-semibold uppercase tracking-widest text-[var(--fg-muted)]">
                最高分
              </p>
              <p id="bestEl" class="text-lg font-bold text-[var(--fg-muted)] leading-tight">0</p>
            </div>
            <div>
              <p class="text-[10px] font-semibold uppercase tracking-widest text-[var(--fg-muted)]">
                等级
              </p>
              <p id="levelEl" class="text-2xl font-black leading-tight">1</p>
            </div>
            <div>
              <p class="text-[10px] font-semibold uppercase tracking-widest text-[var(--fg-muted)]">
                消行
              </p>
              <p id="linesEl" class="text-2xl font-black leading-tight">0</p>
            </div>
          </div>

          <!-- Key hints: flex-1 to fill remaining height -->
          <div
            class="flex flex-col flex-1 bg-[var(--bg-raised)] border border-[var(--border)] rounded-md p-3"
          >
            <div class="flex items-center justify-between mb-2">
              <p class="text-[10px] font-semibold uppercase tracking-widest text-[var(--fg-muted)]">
                操作键
              </p>
              <button
                id="theme-toggle"
                title="切换明暗主题"
                class="w-5 h-5 flex items-center justify-center rounded text-[var(--fg-muted)] hover:text-[var(--fg)] transition-colors -mr-0.5 shrink-0"
              ></button>
            </div>
            <div class="space-y-1.5 text-[11px] text-[var(--fg-muted)]">
              <div class="flex items-center gap-1.5">
                <span
                  class="font-mono bg-[var(--bg-overlay)] border border-[var(--border)] rounded px-1 py-0.5 text-[10px] text-[var(--fg)] shrink-0"
                >
                  ← →
                </span>
                <span>移动</span>
              </div>
              <div class="flex items-center gap-1.5">
                <span
                  class="font-mono bg-[var(--bg-overlay)] border border-[var(--border)] rounded px-1 py-0.5 text-[10px] text-[var(--fg)] shrink-0"
                >
                  ↑ / Z
                </span>
                <span>旋转</span>
              </div>
              <div class="flex items-center gap-1.5">
                <span
                  class="font-mono bg-[var(--bg-overlay)] border border-[var(--border)] rounded px-1 py-0.5 text-[10px] text-[var(--fg)] shrink-0"
                >
                  ↓
                </span>
                <span>加速</span>
              </div>
              <div class="flex items-center gap-1.5">
                <span
                  class="font-mono bg-[var(--bg-overlay)] border border-[var(--border)] rounded px-1 py-0.5 text-[10px] text-[var(--fg)] shrink-0"
                >
                  ␣
                </span>
                <span>瞬降</span>
              </div>
              <div class="flex items-center gap-1.5">
                <span
                  class="font-mono bg-[var(--bg-overlay)] border border-[var(--border)] rounded px-1 py-0.5 text-[10px] text-[var(--fg)] shrink-0"
                >
                  P
                </span>
                <span>暂停</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- end sm:contents wrapper -->

    <script type="module">
      // ─── Theme Toggle ──────────────────────────────────────────────────────────
      const _html = document.documentElement
      _html.dataset.theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
      let _boardBg = '#07070a'
      let _boardGrid = 'rgba(255,255,255,0.03)'
      function _syncThemeTokens() {
        const styles = getComputedStyle(_html)
        _boardBg = styles.getPropertyValue('--board-bg').trim() || _boardBg
        _boardGrid = styles.getPropertyValue('--board-grid').trim() || _boardGrid
      }
      function _updateThemeIcon() {
        const isDark = _html.dataset.theme === 'dark'
        const svg = isDark
          ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`
          : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`
        document.getElementById('theme-toggle').innerHTML = svg
        const m = document.getElementById('theme-toggle-m')
        if (m) m.innerHTML = svg
      }
      function _toggleTheme() {
        _html.dataset.theme = _html.dataset.theme === 'dark' ? 'light' : 'dark'
        _updateThemeIcon()
        _syncThemeTokens()
      }
      document.getElementById('theme-toggle').addEventListener('click', _toggleTheme)
      const _tm = document.getElementById('theme-toggle-m')
      if (_tm) _tm.addEventListener('click', _toggleTheme)
      _updateThemeIcon()
      _syncThemeTokens()
      // ──────────────────────────────────────────────────────────────────────────

      const COLS = 10,
        ROWS = 20,
        SZ = 30
      const bCvs = document.getElementById('board')
      const ctx = bCvs.getContext('2d')
      const pCvs = document.getElementById('preview')
      const pctx = pCvs.getContext('2d')
      const overlay = document.getElementById('overlay')
      const oMsg = document.getElementById('oMsg')
      const oScore = document.getElementById('oScore')
      const startBtn = document.getElementById('startBtn')
      // 桌面端统计元素
      const scoreEl = document.getElementById('scoreEl')
      const bestEl = document.getElementById('bestEl')
      const levelEl = document.getElementById('levelEl')
      const linesEl = document.getElementById('linesEl')
      // 移动端统计元素
      const scoreElM = document.getElementById('scoreElM')
      const bestElM = document.getElementById('bestElM')
      const levelElM = document.getElementById('levelElM')
      const linesElM = document.getElementById('linesElM')

      // 同步更新所有统计显示
      const setScore = v => {
        scoreEl.textContent = scoreElM.textContent = v
      }
      const setBest = v => {
        bestEl.textContent = bestElM.textContent = v
      }
      const setLevel = v => {
        levelEl.textContent = levelElM.textContent = v
      }
      const setLines = v => {
        linesEl.textContent = linesElM.textContent = v
      }

      const PIECES = [
        { color: '#22d3ee', m: [[1, 1, 1, 1]] },
        {
          color: '#facc15',
          m: [
            [1, 1],
            [1, 1],
          ],
        },
        {
          color: '#c084fc',
          m: [
            [0, 1, 0],
            [1, 1, 1],
          ],
        },
        {
          color: '#4ade80',
          m: [
            [0, 1, 1],
            [1, 1, 0],
          ],
        },
        {
          color: '#f87171',
          m: [
            [1, 1, 0],
            [0, 1, 1],
          ],
        },
        {
          color: '#60a5fa',
          m: [
            [1, 0, 0],
            [1, 1, 1],
          ],
        },
        {
          color: '#fb923c',
          m: [
            [0, 0, 1],
            [1, 1, 1],
          ],
        },
      ]

      const SCORE_TABLE = [0, 100, 300, 500, 800]

      let best = +localStorage.getItem('tetris_best') || 0
      setBest(best)

      let board, cur, nxt, score, lvl, totalLines, state, dropAcc, lastTs, rafId

      const rot90 = m => m[0].map((_, c) => m.map(r => r[c]).reverse())
      const mkBoard = () => Array.from({ length: ROWS }, () => Array(COLS).fill(0))
      const randPiece = () => {
        const p = PIECES[Math.floor(Math.random() * PIECES.length)]
        return { m: p.m.map(r => [...r]), color: p.color }
      }

      function valid(m, x, y) {
        for (let r = 0; r < m.length; r++)
          for (let c = 0; c < m[r].length; c++) {
            if (!m[r][c]) continue
            const nr = y + r,
              nc = x + c
            if (nc < 0 || nc >= COLS || nr >= ROWS) return false
            if (nr >= 0 && board[nr][nc]) return false
          }
        return true
      }

      function ghostY() {
        let gy = cur.y
        while (valid(cur.m, cur.x, gy + 1)) gy++
        return gy
      }

      const dropInterval = () => Math.max(80, 800 - (lvl - 1) * 72)

      function spawn() {
        cur = { ...nxt, x: Math.floor((COLS - nxt.m[0].length) / 2), y: 0 }
        nxt = randPiece()
        if (!valid(cur.m, cur.x, cur.y)) endGame()
      }

      function lock() {
        cur.m.forEach((row, r) =>
          row.forEach((v, c) => {
            if (v && cur.y + r >= 0) board[cur.y + r][cur.x + c] = cur.color
          }),
        )
        let cleared = 0
        let r = ROWS - 1
        while (r >= 0) {
          if (board[r].every(Boolean)) {
            board.splice(r, 1)
            board.unshift(Array(COLS).fill(0))
            cleared++
          } else {
            r--
          }
        }
        if (cleared) {
          score += SCORE_TABLE[cleared] * lvl
          totalLines += cleared
          lvl = Math.floor(totalLines / 10) + 1
          setScore(score)
          setLevel(lvl)
          setLines(totalLines)
        }
        if (state !== 'gameover') spawn()
      }

      function endGame() {
        state = 'gameover'
        if (score > best) {
          best = score
          localStorage.setItem('tetris_best', best)
          setBest(best)
          oMsg.textContent = '新纪录！'
        } else {
          oMsg.textContent = '游戏结束'
        }
        oScore.textContent = `得分 ${score}`
        startBtn.textContent = '再来一局'
        overlay.classList.remove('hidden')
      }

      function startGame() {
        board = mkBoard()
        score = 0
        lvl = 1
        totalLines = 0
        dropAcc = 0
        lastTs = null
        setScore(0)
        setLevel(1)
        setLines(0)
        state = 'playing'
        nxt = randPiece()
        spawn()
        overlay.classList.add('hidden')
        if (!rafId) rafId = requestAnimationFrame(loop)
      }

      function drawCell(cx, px, py, color, sz, alpha = 1) {
        cx.save()
        cx.globalAlpha = alpha
        cx.fillStyle = color
        cx.beginPath()
        cx.roundRect(px + 1, py + 1, sz - 2, sz - 2, 2)
        cx.fill()
        cx.fillStyle = 'rgba(255,255,255,0.22)'
        cx.fillRect(px + 2, py + 2, sz - 4, 2)
        cx.fillRect(px + 2, py + 2, 2, sz - 5)
        cx.fillStyle = 'rgba(0,0,0,0.28)'
        cx.fillRect(px + 2, py + sz - 4, sz - 4, 2)
        cx.fillRect(px + sz - 4, py + 2, 2, sz - 5)
        cx.restore()
      }

      function draw() {
        ctx.fillStyle = _boardBg
        ctx.fillRect(0, 0, COLS * SZ, ROWS * SZ)

        ctx.strokeStyle = _boardGrid
        ctx.lineWidth = 1
        for (let c = 0; c <= COLS; c++) {
          ctx.beginPath()
          ctx.moveTo(c * SZ + 0.5, 0)
          ctx.lineTo(c * SZ + 0.5, ROWS * SZ)
          ctx.stroke()
        }
        for (let r = 0; r <= ROWS; r++) {
          ctx.beginPath()
          ctx.moveTo(0, r * SZ + 0.5)
          ctx.lineTo(COLS * SZ, r * SZ + 0.5)
          ctx.stroke()
        }

        board.forEach((row, r) =>
          row.forEach((v, c) => {
            if (v) drawCell(ctx, c * SZ, r * SZ, v, SZ)
          }),
        )

        if (cur) {
          const gy = ghostY()
          if (gy > cur.y) {
            cur.m.forEach((row, r) =>
              row.forEach((v, c) => {
                if (v) drawCell(ctx, (cur.x + c) * SZ, (gy + r) * SZ, cur.color, SZ, 0.15)
              }),
            )
          }
          cur.m.forEach((row, r) =>
            row.forEach((v, c) => {
              if (v) drawCell(ctx, (cur.x + c) * SZ, (cur.y + r) * SZ, cur.color, SZ)
            }),
          )
        }

        pctx.fillStyle = _boardBg
        pctx.fillRect(0, 0, pCvs.width, pCvs.height)
        if (nxt) {
          const psz = 22
          const ox = (pCvs.width - nxt.m[0].length * psz) / 2
          const oy = (pCvs.height - nxt.m.length * psz) / 2
          nxt.m.forEach((row, r) =>
            row.forEach((v, c) => {
              if (v) drawCell(pctx, ox + c * psz, oy + r * psz, nxt.color, psz)
            }),
          )
        }
      }

      function loop(ts) {
        rafId = requestAnimationFrame(loop)
        if (state !== 'playing') {
          lastTs = null
          draw()
          return
        }
        if (!lastTs) {
          lastTs = ts
          return
        }
        const dt = Math.min(ts - lastTs, 100)
        lastTs = ts
        dropAcc += dt
        if (dropAcc >= dropInterval()) {
          dropAcc -= dropInterval()
          if (valid(cur.m, cur.x, cur.y + 1)) cur.y++
          else lock()
        }
        draw()
      }

      function tryRotate() {
        const rot = rot90(cur.m)
        for (const k of [0, -1, 1, -2, 2])
          if (valid(rot, cur.x + k, cur.y)) {
            cur.m = rot
            cur.x += k
            return
          }
      }

      function doHardDrop() {
        const gy = ghostY()
        score += 2 * (gy - cur.y)
        cur.y = gy
        lock()
        dropAcc = 0
        setScore(score)
      }

      // Keyboard controls
      document.addEventListener('keydown', e => {
        if (state === 'gameover' || state === 'start') {
          if (e.code === 'Space') {
            e.preventDefault()
            startGame()
          }
          return
        }
        if (state === 'paused') {
          if (e.code === 'KeyP' || e.code === 'Escape') {
            state = 'playing'
            overlay.classList.add('hidden')
          }
          return
        }
        switch (e.code) {
          case 'ArrowLeft':
            if (valid(cur.m, cur.x - 1, cur.y)) cur.x--
            e.preventDefault()
            break
          case 'ArrowRight':
            if (valid(cur.m, cur.x + 1, cur.y)) cur.x++
            e.preventDefault()
            break
          case 'ArrowDown':
            if (valid(cur.m, cur.x, cur.y + 1)) {
              cur.y++
              score++
              setScore(score)
            }
            dropAcc = 0
            e.preventDefault()
            break
          case 'ArrowUp':
          case 'KeyZ':
            tryRotate()
            e.preventDefault()
            break
          case 'Space':
            doHardDrop()
            e.preventDefault()
            break
          case 'KeyP':
          case 'Escape':
            state = 'paused'
            oMsg.textContent = '游戏暂停'
            oScore.textContent = ''
            startBtn.textContent = '继续游戏'
            overlay.classList.remove('hidden')
            break
        }
      })

      startBtn.addEventListener('click', () => {
        if (state === 'paused') {
          state = 'playing'
          overlay.classList.add('hidden')
        } else startGame()
      })

      // Touch controls
      document.querySelectorAll('[data-tc]').forEach(btn => {
        let timer
        const act = () => {
          if (state !== 'playing') return
          const a = btn.dataset.tc
          if (a === 'left' && valid(cur.m, cur.x - 1, cur.y)) cur.x--
          if (a === 'right' && valid(cur.m, cur.x + 1, cur.y)) cur.x++
          if (a === 'down') {
            if (valid(cur.m, cur.x, cur.y + 1)) {
              cur.y++
              score++
              setScore(score)
            }
            dropAcc = 0
          }
          if (a === 'rotate') tryRotate()
          if (a === 'drop') doHardDrop()
        }
        btn.addEventListener(
          'touchstart',
          e => {
            e.preventDefault()
            act()
            if (['left', 'right', 'down'].includes(btn.dataset.tc)) timer = setInterval(act, 140)
          },
          { passive: false },
        )
        btn.addEventListener('touchend', () => clearInterval(timer))
        btn.addEventListener('touchcancel', () => clearInterval(timer))
      })

      // Init
      state = 'start'
      board = mkBoard()
      nxt = randPiece()
      draw()
      rafId = requestAnimationFrame(loop)
    </script>
  </body>
</html>

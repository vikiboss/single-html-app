<!doctype html>
<html lang="zh-CN">
  <head>
    <link rel="preconnect" href="https://cdn.tailwindcss.com" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>我的应用</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="favicon.ico" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="favicon.ico" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="R2 Web" />
    <style>
      html,
      body {
        touch-action: manipulation;
      }
      :root {
        --grain-opacity: 0.035;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
        opacity: var(--grain-opacity);
        pointer-events: none;
        z-index: 9999;
      }
      .card-hover {
        transition:
          border-color 150ms ease,
          background-color 150ms ease;
      }
      .card-hover:hover {
        border-color: rgba(0, 0, 0, 0.18);
        background-color: rgba(255, 255, 255, 0.95);
      }
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.02em;
        line-height: 1.6;
      }
      #search-input {
        font-size: 16px; /* 防止 iOS 自动缩放 */
      }
      #search-input:focus {
        outline: none;
        border-color: rgba(0, 0, 0, 0.2);
        box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.04);
      }
      #search-input::placeholder {
        color: rgb(161, 161, 170);
      }
      #search-input::-webkit-search-decoration {
        display: none;
      }

      /* ── Dark mode overrides ─────────────────────────────────────────── */
      html[data-theme='dark'] {
        --grain-opacity: 0.022;
      }
      html[data-theme='dark'] body {
        color: #f4f4f5;
        background: linear-gradient(135deg, #09090b 0%, #111115 50%, #0e0c14 100%) !important;
      }
      html[data-theme='dark'] .card-hover {
        background-color: #18181b !important;
        border-color: #3f3f46 !important;
        color: #f4f4f5;
      }
      html[data-theme='dark'] .card-hover:hover {
        border-color: rgba(255, 255, 255, 0.12) !important;
        background-color: #27272a !important;
      }
      html[data-theme='dark'] .text-zinc-900 {
        color: #f4f4f5 !important;
      }
      html[data-theme='dark'] .text-zinc-700 {
        color: #d4d4d8 !important;
      }
      html[data-theme='dark'] .text-zinc-500 {
        color: #a1a1aa !important;
      }
      html[data-theme='dark'] .text-zinc-400 {
        color: #71717a !important;
      }
      html[data-theme='dark'] .text-zinc-300 {
        color: #52525b !important;
      }
      html[data-theme='dark'] .bg-white {
        background-color: #18181b !important;
      }
      html[data-theme='dark'] .border-zinc-200 {
        border-color: #3f3f46 !important;
      }
      html[data-theme='dark'] .border-zinc-200\/60 {
        border-color: rgba(63, 63, 70, 0.6) !important;
      }
      html[data-theme='dark'] .bg-zinc-100 {
        background-color: #27272a !important;
        color: #a1a1aa;
      }
      html[data-theme='dark'] .bg-zinc-800 {
        background-color: #f4f4f5 !important;
        color: #09090b !important;
      }
      html[data-theme='dark'] .text-white {
        color: #09090b !important;
      }
      html[data-theme='dark'] .bg-zinc-900 {
        background-color: #f4f4f5 !important;
      }
      html[data-theme='dark'] .hover\:bg-zinc-200:hover {
        background-color: #3f3f46 !important;
      }
      html[data-theme='dark'] .hover\:text-zinc-700:hover {
        color: #f4f4f5 !important;
      }
      html[data-theme='dark'] .hover\:text-zinc-600:hover {
        color: #d4d4d8 !important;
      }
      html[data-theme='dark'] .group:hover .group-hover\:text-zinc-700 {
        color: #a1a1aa !important;
      }
      html[data-theme='dark'] #search-input {
        background-color: #18181b !important;
        border-color: #3f3f46 !important;
        color: #f4f4f5 !important;
      }
      html[data-theme='dark'] #search-input::placeholder {
        color: #52525b;
      }
      html[data-theme='dark'] #search-input:focus {
        border-color: rgba(255, 255, 255, 0.2) !important;
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04) !important;
      }
      html[data-theme='dark'] code.bg-zinc-100 {
        background-color: #27272a !important;
        color: #a1a1aa !important;
      }
      html[data-theme='dark'] a.text-zinc-500 {
        color: #a1a1aa !important;
      }
      html[data-theme='dark'] a.hover\:text-zinc-700:hover {
        color: #f4f4f5 !important;
      }
      html[data-theme='dark'] #theme-toggle {
        color: #71717a;
      }
      html[data-theme='dark'] #theme-toggle:hover {
        color: #f4f4f5;
      }
    </style>
  </head>
  <body
    class="min-h-screen text-zinc-900"
    style="background: linear-gradient(135deg, #f8f8f6 0%, #f0ede8 50%, #ece8f0 100%)"
  >
    <div id="root"></div>

    <script type="module">
      // =====================================================
      // 在这里填写你的应用列表
      // =====================================================
      const APPS = [
        {
          title: '扫雷',
          description: '经典扫雷游戏',
          href: 'minesweeper.html',
          tags: ['游戏'],
          date: '2026-03-04',
        },
        {
          title: '盘古之白',
          description: '中英文排版工具',
          href: 'pangu.html',
          tags: ['工具'],
          date: '2026-03-04',
        },
        {
          title: '数独',
          description: '经典数独游戏',
          href: 'sudoku.html',
          tags: ['游戏'],
          date: '2026-03-05',
        },
        {
          title: '2048',
          description: '经典 2048 游戏',
          href: '2048.html',
          tags: ['游戏'],
          date: '2026-03-05',
        },
        {
          title: '连连看',
          description: '经典连连看游戏',
          href: 'lianliankan.html',
          tags: ['游戏'],
          date: '2026-03-05',
        },
        {
          title: '贪吃蛇',
          description: '经典贪吃蛇游戏',
          href: 'snake.html',
          tags: ['游戏'],
          date: '2026-03-05',
        },
        {
          title: 'Nokia 滚球',
          description: '诺基亚经典滚球游戏',
          href: 'nokia-bounce.html',
          tags: ['游戏'],
          date: '2026-03-05',
        },
        {
          title: '俄罗斯方块',
          description: '经典俄罗斯方块游戏',
          href: 'tetris.html',
          tags: ['游戏'],
          date: '2026-03-05',
        },
        {
          title: '推箱子',
          description: '经典推箱子游戏',
          href: 'sokoban.html',
          tags: ['游戏'],
          date: '2026-03-05',
        },
        {
          title: '随机生成器',
          description: '多场景随机生成器',
          href: 'random.html',
          tags: ['工具'],
          date: '2026-03-05',
        },
      ].toReversed() // 最新的应用放在最前面

      // =====================================================
      // 以下无需修改
      // =====================================================

      const ME = {
        name: '我的应用',
        subtitle: 'Viki 的单页 HTML 应用工具、游戏与实验项目合集。',
        github: 'https://github.com/vikiboss/single-html-app',
        author: { name: 'Viki', handle: 'vikiboss', email: 'hi@viki.moe' },
      }

      // ── 状态 ──────────────────────────────────────────────
      const state = { query: '', activeTag: null }

      function getAllTags() {
        return [...new Set(APPS.flatMap(a => a.tags || []))]
      }

      function getFilteredApps() {
        const { query, activeTag } = state
        const q = query.trim().toLowerCase()
        return APPS.filter(app => {
          const matchesQuery =
            !q ||
            app.title.toLowerCase().includes(q) ||
            (app.description || '').toLowerCase().includes(q)
          const matchesTag = !activeTag || (app.tags || []).includes(activeTag)
          return matchesQuery && matchesTag
        })
      }

      // ── 图标 ──────────────────────────────────────────────
      function iconSearch() {
        return `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="5.5" cy="5.5" r="3.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M8.5 8.5 12 12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>`
      }

      function iconArrow() {
        return `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.5 7h9M8 3.5 11.5 7 8 10.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`
      }

      function iconGrid() {
        return `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1.5" y="1.5" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.3"/>
        <rect x="8.5" y="1.5" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.3"/>
        <rect x="1.5" y="8.5" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.3"/>
        <rect x="8.5" y="8.5" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.3"/>
      </svg>`
      }

      function iconGitHub() {
        return `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M7 1C3.686 1 1 3.686 1 7c0 2.654 1.721 4.903 4.108 5.697.3.055.41-.13.41-.29 0-.142-.005-.519-.008-1.018-1.669.363-2.02-.804-2.02-.804-.273-.693-.666-.877-.666-.877-.545-.372.041-.365.041-.365.602.042.919.618.919.618.535.917 1.403.652 1.745.499.054-.388.209-.652.38-.802-1.332-.152-2.732-.666-2.732-2.963 0-.655.234-1.19.618-1.61-.062-.151-.268-.762.058-1.588 0 0 .504-.161 1.65.615A5.75 5.75 0 0 1 7 4.757c.51.002 1.023.069 1.503.202 1.145-.776 1.648-.615 1.648-.615.327.826.121 1.437.06 1.588.384.42.617.955.617 1.61 0 2.303-1.403 2.81-2.74 2.958.216.186.408.552.408 1.112 0 .803-.007 1.45-.007 1.647 0 .161.108.348.413.289A6.002 6.002 0 0 0 13 7c0-3.314-2.686-6-6-6Z" fill="currentColor"/>
      </svg>`
      }

      // ── 渲染函数 ──────────────────────────────────────────
      function renderCard(app) {
        const tags = (app.tags || [])
          .map(t => `<span class="tag bg-zinc-100 text-zinc-500">${t}</span>`)
          .join('')

        const githubFileUrl = `${ME.github}/blob/main/${app.href}`
        const githubLink = `<a href="${githubFileUrl}" target="_blank" rel="noopener noreferrer"
          class="flex items-center gap-1 text-zinc-400 hover:text-zinc-600 transition-colors duration-150 no-underline"
          onclick="event.stopPropagation()">
          ${iconGitHub()}<span>源码</span>
        </a>`

        const meta = [
          app.date ? `<span class="text-zinc-400 text-xs">${app.date}</span>` : '',
          tags,
        ]
          .filter(Boolean)
          .join('')

        return `
        <div onclick="location.href='${app.href}'" class="card-hover group block bg-white border border-zinc-200 rounded-md p-5 cursor-pointer">
          <div class="flex items-start justify-between gap-3 mb-2">
            <h2 class="text-sm font-semibold text-zinc-900 leading-snug">${app.title}</h2>
            <span class="shrink-0 text-zinc-300 group-hover:text-zinc-700 transition-colors duration-150 mt-0.5">${iconArrow()}</span>
          </div>
          ${app.description ? `<p class="text-xs text-zinc-500 leading-relaxed mb-3">${app.description}</p>` : ''}
          <div class="flex items-center justify-between gap-2 flex-wrap">
            ${meta ? `<div class="flex items-center gap-2 flex-wrap">${meta}</div>` : '<div></div>'}
            <div class="text-xs">${githubLink}</div>
          </div>
        </div>
      `
      }

      function renderTagPills() {
        const allTags = getAllTags()
        return [null, ...allTags]
          .map(tag => {
            const label = tag || '全部'
            const isActive = state.activeTag === tag
            const cls = isActive
              ? 'bg-zinc-800 text-white'
              : 'bg-zinc-100 text-zinc-500 hover:bg-zinc-200 hover:text-zinc-700'
            return `<button
              class="tag ${cls} border-0 cursor-pointer transition-colors duration-150"
              onclick="window.__setTag(${tag ? `'${tag}'` : 'null'})"
            >${label}</button>`
          })
          .join('')
      }

      function renderEmpty() {
        return `
        <div class="flex flex-col items-center justify-center py-24 text-center">
          <div class="w-12 h-12 rounded-md bg-zinc-100 border border-zinc-200 flex items-center justify-center mb-4 text-zinc-400">
            ${iconGrid()}
          </div>
          <p class="text-sm text-zinc-500 mb-1">暂无应用</p>
          <p class="text-xs text-zinc-400">在 <code class="bg-zinc-100 px-1 py-0.5 rounded text-zinc-500">index.html</code> 的 <code class="bg-zinc-100 px-1 py-0.5 rounded text-zinc-500">APPS</code> 数组中添加你的应用。</p>
        </div>
      `
      }

      function renderNoResults() {
        return `
        <div class="flex flex-col items-center justify-center py-20 text-center">
          <div class="w-12 h-12 rounded-md bg-zinc-100 border border-zinc-200 flex items-center justify-center mb-4 text-zinc-400">
            ${iconSearch()}
          </div>
          <p class="text-sm text-zinc-500 mb-1">没有找到匹配的应用</p>
          <p class="text-xs text-zinc-400">换个关键词或分类试试？</p>
        </div>
      `
      }

      // ── 局部更新（不重绘整页，保留搜索框焦点） ────────────
      function updateResults() {
        const el = document.getElementById('results')
        if (!el) return
        const filtered = getFilteredApps()
        el.innerHTML =
          filtered.length === 0
            ? renderNoResults()
            : `<div class="grid gap-3 sm:grid-cols-2">${filtered.map(renderCard).join('')}</div>`
      }

      function updateTagPills() {
        const el = document.getElementById('tag-pills')
        if (el) el.innerHTML = renderTagPills()
      }

      function updateCount() {
        const el = document.getElementById('app-count')
        if (!el) return
        const filtered = getFilteredApps()
        const isFiltered = state.query.trim() || state.activeTag
        el.textContent = isFiltered
          ? `${filtered.length} / ${APPS.length} 个应用`
          : `${APPS.length} 个应用`
      }

      // ── 全局事件处理器 ────────────────────────────────────
      window.__handleSearch = function (value) {
        state.query = value
        updateResults()
        updateTagPills()
        updateCount()
      }

      window.__setTag = function (tag) {
        state.activeTag = tag
        updateResults()
        updateTagPills()
        updateCount()
      }

      // ── 首次完整渲染 ──────────────────────────────────────
      function render() {
        const root = document.getElementById('root')
        const count = APPS.length
        const allTags = getAllTags()

        root.innerHTML = `
        <div class="max-w-2xl mx-auto px-4 sm:px-6 py-12 sm:py-16">
          <header class="mb-10">
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center gap-2">
                <div class="w-5 h-5 rounded bg-zinc-900 flex items-center justify-center text-white">
                  ${iconGrid()}
                </div>
                <span id="app-count" class="text-xs text-zinc-400 font-medium">${count} 个应用</span>
              </div>
              <div class="flex items-center gap-2">
                <a href="${ME.github}" target="_blank" rel="noopener noreferrer"
                  class="flex items-center gap-1.5 text-xs text-zinc-400 hover:text-zinc-700 transition-colors duration-150 no-underline">
                  ${iconGitHub()}
                  <span>GitHub</span>
                </a>
                <button id="theme-toggle" title="切换明暗主题"
                  class="w-6 h-6 flex items-center justify-center rounded text-zinc-400 hover:text-zinc-700 transition-colors duration-150"></button>
              </div>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-zinc-900 mb-1">${ME.name}</h1>
            <p class="text-sm text-zinc-500">${ME.subtitle}</p>
          </header>

          <main>
            ${
              count === 0
                ? renderEmpty()
                : `
              <div class="mb-6">
                <div class="relative">
                  <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400 pointer-events-none">
                    ${iconSearch()}
                  </span>
                  <input
                    id="search-input"
                    type="search"
                    placeholder="搜索应用名称或描述…"
                    oninput="window.__handleSearch(this.value)"
                    class="w-full bg-white border border-zinc-200 rounded-md pl-8 pr-4 py-2 text-zinc-700 transition-shadow duration-150"
                  />
                </div>
                ${
                  allTags.length > 0
                    ? `<div id="tag-pills" class="flex items-center gap-1.5 flex-wrap mt-2.5">${renderTagPills()}</div>`
                    : ''
                }
              </div>
              <div id="results">
                <div class="grid gap-3 sm:grid-cols-2">${APPS.map(renderCard).join('')}</div>
              </div>
            `
            }
          </main>

          <footer class="mt-16 pt-6 border-t border-zinc-200/60 flex items-center justify-between">
            <span class="text-xs text-zinc-400">
              Made with love by
              <a href="mailto:${ME.author.email}"
                class="text-zinc-500 hover:text-zinc-700 transition-colors duration-150 no-underline">
                ${ME.author.name}
              </a>
              ·
              <a href="https://github.com/${ME.author.handle}" target="_blank" rel="noopener noreferrer"
                class="text-zinc-500 hover:text-zinc-700 transition-colors duration-150 no-underline">
                @${ME.author.handle}
              </a>
            </span>
            <span class="text-xs text-zinc-400">
              <a href="https://vercel.com/" target="_blank" rel="noopener noreferrer"
                class="text-zinc-400 hover:text-zinc-700 underline underline-offset-2 transition-colors duration-150">
                Deployed on Vercel
              </a>
            </span>
          </footer>
        </div>
      `
      }

      render()

      // ─── Theme Toggle ────────────────────────────────────────────────────────
      ;(() => {
        const _html = document.documentElement
        _html.dataset.theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        const _sunSVG = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`
        const _moonSVG = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`
        function _updateIcon() {
          const btn = document.getElementById('theme-toggle')
          if (btn) btn.innerHTML = _html.dataset.theme === 'dark' ? _sunSVG : _moonSVG
        }
        document.addEventListener('click', e => {
          if (e.target.closest('#theme-toggle')) {
            _html.dataset.theme = _html.dataset.theme === 'dark' ? 'light' : 'dark'
            _updateIcon()
          }
        })
        _updateIcon()
      })()
      // ─────────────────────────────────────────────────────────────────────────
    </script>
    <script src="gesture-guard.js"></script>
  </body>
</html>

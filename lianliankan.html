          --bg-glow-2: rgba(37, 99, 235, 0.08);

        --border: #3f3f46;
        --accent: #60a5fa;
        --icon-1: #38bdf8;
        --icon-2: #22d3ee;

        --bg: #ffffff;
        --bg-raised: #f4f4f5;
        --bg-overlay: #e4e4e7;
        --fg: #09090b;
        --fg-muted: #71717a;
        --border: #d4d4d8;
        --accent: #2563eb;
        --icon-1: #0284c7;
        --icon-2: #0891b2;
        --icon-3: #059669;
        --icon-4: #65a30d;
        --icon-5: #d97706;
        --icon-6: #e11d48;
        --icon-7: #be185d;
        --icon-8: #7c3aed;
        --bg-glow-1: rgba(37, 99, 235, 0.12);
        --bg-glow-2: rgba(37, 99, 235, 0.08);
      }
    </style>
  </head>
  <body

  >

                <rect

                  height="5"
                  rx="1.2"
                  stroke="currentColor"
                  stroke-width="1.5"

                <rect
                  x="12.5"
                  y="2.5"
                  width="5"
                  height="5"

                <rect

                  rx="1.2"

                <rect

          </div>
          <p class="text-xs sm:text-sm text-[var(--fg-muted)]">
            连接两张相同图标，最多 2 次拐弯。清空棋盘即获胜。
          </p>
        </header>

        <div class="flex flex-wrap items-center justify-center gap-2">
          <button
            id="btn-new"
            class="px-4 py-1.5 text-sm rounded-md border border-[var(--border)] bg-[var(--bg-raised)] text-[var(--accent)] font-medium hover:bg-[var(--bg-overlay)] transition-colors duration-150 active:scale-95"

            新开局

            id="btn-shuffle"
            class="px-3.5 py-1.5 text-sm rounded-md border border-[var(--border)] bg-[var(--bg-raised)] text-[var(--fg)]/90 hover:bg-[var(--bg-overlay)] transition-colors duration-150 active:scale-95"

            id="btn-hint"

            id="theme-toggle"
            title="切换明暗主题"
            class="px-2 py-1.5 text-sm rounded-md border border-[var(--border)] bg-[var(--bg-raised)] text-[var(--fg-muted)] hover:bg-[var(--bg-overlay)] transition-colors duration-150 active:scale-95 w-8 h-8 flex items-center justify-center"

          <svg id="overlay" class="absolute pointer-events-none z-10"></svg>
        </div>

    <script type="module">
      // ─── Theme Toggle ─────────────────────────────────────────────────
      const _html = document.documentElement
      _html.dataset.theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
      document.getElementById('theme-toggle').addEventListener('click', () => {
        _html.dataset.theme = _html.dataset.theme === 'dark' ? 'light' : 'dark'
        _updateThemeIcon()
      })
      function _updateThemeIcon() {
        const isDark = _html.dataset.theme === 'dark'
        document.getElementById('theme-toggle').innerHTML = isDark
          ? `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`
          : `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`
      }
      _updateThemeIcon()

      const rows = 6
      const cols = 8
      const total = rows * cols
      const hudEl = document.getElementById('hud')
      const boardSectionEl = document.getElementById('board-section')
      const boardWrapEl = document.getElementById('board-wrap')
      const boardEl = document.getElementById('board')
      const overlayEl = document.getElementById('overlay')
      const timeEl = document.getElementById('time')
      const movesEl = document.getElementById('moves')
      const leftEl = document.getElementById('left')
      const statusEl = document.getElementById('status')

      const colorClasses = [
        'text-[var(--icon-1)]',
        'text-[var(--icon-2)]',
        'text-[var(--icon-3)]',
        'text-[var(--icon-4)]',
        'text-[var(--icon-5)]',

        'text-[var(--icon-7)]',
        'text-[var(--icon-8)]',

      const icons = [

        </svg>`,
        },

          <path d="M31.5 8.5c-2.6 1.2-4.6 3.6-5.3 6.6-1.7 7 2.6 13.9 9.6 15.6 1.8.4 3.6.4 5.2 0-3.1 4.7-8.6 7.4-14.6 6-7.6-1.8-12.3-9.4-10.6-17 1.4-6 6.1-10.2 11.7-11.2z" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round"/>
        </svg>`,

          <path d="M24 6c5 7 3 11 0 15-2-3-4-6-4-10-6 6-9 12-8 18 1 7 7 12 14 12s13-5 14-12c1-8-4-13-10-23z" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round"/>
        </svg>`,
        },
        {

          <path d="M14 34h20a8 8 0 0 0 0-16 10 10 0 0 0-20-2A7 7 0 0 0 14 34z" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round"/>

          <circle cx="28" cy="18" r="3" stroke="currentColor" stroke-width="2.4" />

          <path d="M6 24c6-6 18-10 30-6 4 2 6 6 6 6s-2 4-6 6c-12 4-24 0-30-6z" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round"/>
          <circle cx="30" cy="22" r="2" fill="currentColor" />
          <path d="M10 20l-4-4M10 28l-4 4" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>

          <path d="M10 18 18 8h12l8 10-14 22-14-22z" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round"/>

        </svg>`,

          <circle cx="24" cy="24" r="4" stroke="currentColor" stroke-width="2.4" />
          <path d="M24 10c4 0 6 6 0 10-6-4-4-10 0-10zM38 24c0 4-6 6-10 0 4-6 10-4 10 0zM24 38c-4 0-6-6 0-10 6 4 4 10 0 10zM10 24c0-4 6-6 10 0-4 6-10 4-10 0z" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round"/>
        </svg>`,
        },
        {
          name: 'mountain',
          svg: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 36 20 12l8 12 4-6 10 18H6z" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round"/>
          <path d="M20 12l8 12" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
        </svg>`,
        },
        {
          name: 'anchor',
          svg: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z" stroke="currentColor" stroke-width="2.4" />
          <path d="M24 16v18" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
          <path d="M12 28c0 8 24 8 24 0" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
          <path d="M8 28h8M32 28h8" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
        </svg>`,
        },
        {
          name: 'planet',
          svg: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="8" stroke="currentColor" stroke-width="2.4" />
          <path d="M10 24c6-4 22-8 28-4 3 2-3 8-10 11-8 3-16 2-18-2" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>`,
        },
      ]

      const state = {
        grid: [],
        cells: [],
        selected: null,
        moves: 0,
        matches: 0,
        startTime: 0,
        timer: null,
        busy: false,
        cellSize: 48,
        gap: 8,
      }
      let overlayFrame = null

      function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1))
          ;[array[i], array[j]] = [array[j], array[i]]
        }
        return array
      }

      function createGrid() {
        const pairs = total / 2
        const pool = []
        for (let i = 0; i < pairs; i++) {
          const iconId = i % icons.length
          pool.push(iconId + 1, iconId + 1)
        }
        shuffle(pool)
        const padded = Array.from({ length: rows + 2 }, () => Array(cols + 2).fill(0))
        let index = 0
        for (let r = 1; r <= rows; r++) {
          for (let c = 1; c <= cols; c++) {
            padded[r][c] = pool[index]
            index += 1
          }
        }
        state.grid = padded
      }

      function buildBoard() {
        boardEl.innerHTML = ''
        boardEl.style.gridTemplateColumns = `repeat(${cols}, auto)`
        state.cells = []
        for (let r = 1; r <= rows; r++) {
          const row = []
          for (let c = 1; c <= cols; c++) {
            const btn = document.createElement('button')
            btn.type = 'button'
            btn.dataset.r = String(r)
            btn.dataset.c = String(c)
            btn.className = [
              'relative aspect-square w-12 h-12 sm:w-14 sm:h-14',
              'rounded-md border border-[var(--border)]',
              'bg-[var(--bg-raised)] text-[var(--fg)]',
              'flex items-center justify-center',
              'transition-colors duration-150',
              'hover:bg-[var(--bg-overlay)]',
              'focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--accent)]',
            ].join(' ')
            boardEl.appendChild(btn)
            row.push(btn)
          }
          state.cells.push(row)
        }
      }

      function iconMarkup(iconId) {
        const icon = icons[iconId - 1]
        const colorClass = colorClasses[(iconId - 1) % colorClasses.length]
        const size = Math.round((state.cellSize || 48) * 0.6)
        return `<div class="${colorClass}" style="width:${size}px;height:${size}px">${icon.svg}</div>`
      }

      function syncBoard() {
        for (let r = 1; r <= rows; r++) {
          for (let c = 1; c <= cols; c++) {
            const btn = state.cells[r - 1][c - 1]
            const id = state.grid[r][c]
            btn.dataset.id = String(id)
            btn.dataset.empty = id === 0 ? '1' : '0'
            btn.classList.remove('ring-2', 'ring-[var(--accent)]', 'bg-[var(--bg-overlay)]')
            if (id === 0) {
              btn.innerHTML = ''
              btn.classList.add('opacity-0', 'pointer-events-none')
            } else {
              btn.innerHTML = iconMarkup(id)
              btn.classList.remove('opacity-0', 'pointer-events-none')
            }
          }
        }
        updateLeft()
        queueOverlaySync()
      }

      function updateLeft() {
        let left = 0
        for (let r = 1; r <= rows; r++) {
          for (let c = 1; c <= cols; c++) {
            if (state.grid[r][c] !== 0) left += 1
          }
        }
        leftEl.textContent = String(left)
      }

      function resetTimer() {
        if (state.timer) clearInterval(state.timer)
        state.startTime = Date.now()
        state.timer = setInterval(() => {
          timeEl.textContent = formatTime(Date.now() - state.startTime)
        }, 1000)
      }

      function formatTime(ms) {
        const totalSec = Math.floor(ms / 1000)
        const min = String(Math.floor(totalSec / 60)).padStart(2, '0')
        const sec = String(totalSec % 60).padStart(2, '0')
        return `${min}:${sec}`
      }

      function setStatus(text) {
        statusEl.textContent = text
      }

      function inBounds(r, c) {
        return r >= 0 && r <= rows + 1 && c >= 0 && c <= cols + 1
      }

      function canPass(r, c, end) {
        if (r === end.r && c === end.c) return true
        return state.grid[r][c] === 0
      }

      function findPath(start, end) {
        const dirs = [
          { dr: -1, dc: 0 },
          { dr: 1, dc: 0 },
          { dr: 0, dc: -1 },
          { dr: 0, dc: 1 },
        ]
        const visited = Array.from({ length: rows + 2 }, () =>
          Array.from({ length: cols + 2 }, () => Array(4).fill(Infinity)),
        )
        const prev = Array.from({ length: rows + 2 }, () =>
          Array.from({ length: cols + 2 }, () => Array(4).fill(null)),
        )
        const queue = []
        dirs.forEach((dir, index) => {
          const nr = start.r + dir.dr
          const nc = start.c + dir.dc
          if (!inBounds(nr, nc)) return
          if (!canPass(nr, nc, end)) return
          visited[nr][nc][index] = 0
          prev[nr][nc][index] = { r: start.r, c: start.c, dir: -1 }
          queue.push({ r: nr, c: nc, dir: index, turns: 0 })
        })

        while (queue.length) {
          const node = queue.shift()
          if (node.turns > 2) continue
          if (node.r === end.r && node.c === end.c) {
            return buildPath(node, prev)
          }
          for (let i = 0; i < dirs.length; i++) {
            const dir = dirs[i]
            const nr = node.r + dir.dr
            const nc = node.c + dir.dc
            if (!inBounds(nr, nc)) continue
            if (!canPass(nr, nc, end)) continue
            const nturns = node.turns + (i === node.dir ? 0 : 1)
            if (nturns > 2) continue
            if (nturns >= visited[nr][nc][i]) continue
            visited[nr][nc][i] = nturns
            prev[nr][nc][i] = { r: node.r, c: node.c, dir: node.dir }
            queue.push({ r: nr, c: nc, dir: i, turns: nturns })
          }
        }
        return null
      }

      function buildPath(node, prev) {
        const path = []
        let cur = node
        while (cur) {
          path.push({ r: cur.r, c: cur.c })
          const p = prev[cur.r][cur.c][cur.dir]
          if (!p) break
          if (p.dir === -1) {
            path.push({ r: p.r, c: p.c })
            break
          }
          cur = p
        }
        return path.reverse()
      }

      function compressPath(path) {
        if (path.length <= 2) return path
        const simplified = [path[0]]
        for (let i = 1; i < path.length - 1; i++) {
          const prev = simplified[simplified.length - 1]
          const curr = path[i]
          const next = path[i + 1]
          const dir1 = { r: curr.r - prev.r, c: curr.c - prev.c }
          const dir2 = { r: next.r - curr.r, c: next.c - curr.c }
          if (dir1.r === dir2.r && dir1.c === dir2.c) continue
          simplified.push(curr)
        }
        simplified.push(path[path.length - 1])
        return simplified
      }

      function computeLayout() {
        const viewport = Math.min(
          window.innerWidth,
          document.documentElement.clientWidth || window.innerWidth,
        )
        const bodyPad = viewport < 640 ? 24 : 32
        const sectionPad = viewport < 640 ? 24 : 32
        const border = 2
        const maxBoardWidth = Math.max(240, viewport - bodyPad - sectionPad * 2 - border)
        const gap = viewport < 640 ? 6 : 8
        const cell = Math.floor((maxBoardWidth - gap * (cols - 1)) / cols)
        const cellSize = Math.max(28, Math.min(56, cell))
        return { cellSize, gap }
      }

      function applyLayout() {
        const layout = computeLayout()
        state.cellSize = layout.cellSize
        state.gap = layout.gap
        boardEl.style.gap = `${layout.gap}px`
        boardEl.style.gridTemplateColumns = `repeat(${cols}, ${layout.cellSize}px)`
        state.cells.flat().forEach(btn => {
          btn.style.width = `${layout.cellSize}px`
          btn.style.height = `${layout.cellSize}px`
        })
      }

      function measureBoard() {
        const first = boardEl.querySelector('button')
        if (!first) return null
        const wrapRect = boardWrapEl.getBoundingClientRect()
        const cellRect = first.getBoundingClientRect()
        const gap = parseFloat(getComputedStyle(boardEl).gap || '0')
        const step = cellRect.width + gap
        const pad = step
        return { wrapRect, cellRect, gap, step, pad }
      }

      function queueOverlaySync() {
        if (overlayFrame) cancelAnimationFrame(overlayFrame)
        overlayFrame = requestAnimationFrame(() => {
          overlayFrame = null
          syncOverlay()
          syncHudWidth()
        })
      }

      function syncHudWidth() {
        if (!boardSectionEl || !hudEl) return
        const rect = boardSectionEl.getBoundingClientRect()
        if (!rect.width) return
        hudEl.style.width = `${rect.width}px`
      }

      function syncOverlay() {
        const measure = measureBoard()
        if (!measure) return
        overlayEl.style.left = `${-measure.pad}px`
        overlayEl.style.top = `${-measure.pad}px`
        overlayEl.setAttribute('width', measure.wrapRect.width + measure.pad * 2)
        overlayEl.setAttribute('height', measure.wrapRect.height + measure.pad * 2)
        overlayEl.setAttribute(
          'viewBox',
          `0 0 ${measure.wrapRect.width + measure.pad * 2} ${measure.wrapRect.height + measure.pad * 2}`,
        )
      }

      function pathToPoints(path) {
        const measure = measureBoard()
        if (!measure) return []
        const { wrapRect, step, pad } = measure

        function centerForCell(r, c) {
          const cell = state.cells[r - 1][c - 1]
          const rect = cell.getBoundingClientRect()
          return {
            x: rect.left - wrapRect.left + rect.width / 2 + pad,
            y: rect.top - wrapRect.top + rect.height / 2 + pad,
          }
        }

        function pointPosition(r, c) {
          const inRow = r >= 1 && r <= rows
          const inCol = c >= 1 && c <= cols
          let x
          let y

          if (inCol) {
            x = centerForCell(1, c).x
          } else if (c === 0) {
            x = centerForCell(1, 1).x - step
          } else if (c === cols + 1) {
            x = centerForCell(1, cols).x + step
          }

          if (inRow) {
            y = centerForCell(r, 1).y
          } else if (r === 0) {
            y = centerForCell(1, 1).y - step
          } else if (r === rows + 1) {
            y = centerForCell(rows, 1).y + step
          }

          return { x, y }
        }

        return path.map(point => pointPosition(point.r, point.c))
      }

      function drawPath(path) {
        syncOverlay()
        overlayEl.innerHTML = ''
        const points = pathToPoints(compressPath(path))
        if (points.length === 0) return
        const d = points.map((p, index) => `${index === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ')
        overlayEl.innerHTML = `<path d="${d}" fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />`
      }

      function clearPath() {
        overlayEl.innerHTML = ''
      }

      function clearSelection() {
        if (!state.selected) return
        state.selected.el.classList.remove(
          'ring-2',
          'ring-[var(--accent)]',
          'bg-[var(--bg-overlay)]',
        )
        state.selected = null
      }

      function selectTile(el) {
        el.classList.add('ring-2', 'ring-[var(--accent)]', 'bg-[var(--bg-overlay)]')
        state.selected = {
          el,
          r: Number(el.dataset.r),
          c: Number(el.dataset.c),
          id: Number(el.dataset.id),
        }
      }

      function handleTileClick(event) {
        const btn = event.target.closest('button')
        if (!btn || state.busy) return
        const id = Number(btn.dataset.id)
        if (!id) return
        if (!state.selected) {
          clearPath()
          selectTile(btn)
          return
        }
        if (btn === state.selected.el) {
          clearSelection()
          return
        }

        state.moves += 1
        movesEl.textContent = String(state.moves)

        const start = { r: state.selected.r, c: state.selected.c }
        const end = { r: Number(btn.dataset.r), c: Number(btn.dataset.c) }
        if (state.selected.id === id) {
          const path = findPath(start, end)
          if (path) {
            state.busy = true
            drawPath(path)
            setTimeout(() => {
              state.grid[start.r][start.c] = 0
              state.grid[end.r][end.c] = 0
              syncBoard()
              clearPath()
              clearSelection()
              state.busy = false
              setStatus('匹配成功。继续吧。')
              checkWin()
              ensureMove()
            }, 180)
            return
          }
        }
        clearSelection()
        clearPath()
        selectTile(btn)
        setStatus('无法连通，换一张试试。')
      }

      function checkWin() {
        const left = Number(leftEl.textContent)
        if (left === 0) {
          setStatus('恭喜通关！点击「新开局」再来一盘。')
          clearInterval(state.timer)
        }
      }

      function findAnyMove() {
        for (let r1 = 1; r1 <= rows; r1++) {
          for (let c1 = 1; c1 <= cols; c1++) {
            const id = state.grid[r1][c1]
            if (!id) continue
            for (let r2 = r1; r2 <= rows; r2++) {
              for (let c2 = 1; c2 <= cols; c2++) {
                if (r1 === r2 && c2 <= c1) continue
                if (state.grid[r2][c2] !== id) continue
                const path = findPath({ r: r1, c: c1 }, { r: r2, c: c2 })
                if (path) return { a: { r: r1, c: c1 }, b: { r: r2, c: c2 }, path }
              }
            }
          }
        }
        return null
      }

      function ensureMove() {
        const left = Number(leftEl.textContent)
        if (left === 0) return
        const move = findAnyMove()
        if (!move) {
          shuffleRemaining()
          setStatus('已自动洗牌，继续吧。')
        }
      }

      function shuffleRemaining() {
        const pool = []
        for (let r = 1; r <= rows; r++) {
          for (let c = 1; c <= cols; c++) {
            if (state.grid[r][c] !== 0) pool.push(state.grid[r][c])
          }
        }
        shuffle(pool)
        let index = 0
        for (let r = 1; r <= rows; r++) {
          for (let c = 1; c <= cols; c++) {
            if (state.grid[r][c] !== 0) {
              state.grid[r][c] = pool[index]
              index += 1
            }
          }
        }
        clearSelection()
        clearPath()
        syncBoard()
      }

      function showHint() {
        if (state.busy) return
        const move = findAnyMove()
        if (!move) {
          setStatus('当前无解，先洗牌。')
          shuffleRemaining()
          return
        }
        const aEl = state.cells[move.a.r - 1][move.a.c - 1]
        const bEl = state.cells[move.b.r - 1][move.b.c - 1]
        aEl.classList.add('ring-2', 'ring-[var(--accent)]')
        bEl.classList.add('ring-2', 'ring-[var(--accent)]')
        drawPath(move.path)
        setStatus('提示已显示，抓紧消除。')
        setTimeout(() => {
          aEl.classList.remove('ring-2', 'ring-[var(--accent)]')
          bEl.classList.remove('ring-2', 'ring-[var(--accent)]')
          clearPath()
        }, 500)
      }

      function newGame() {
        createGrid()
        buildBoard()
        applyLayout()
        syncBoard()
        state.moves = 0
        movesEl.textContent = '0'
        setStatus('新棋盘已就绪。')
        resetTimer()
        ensureMove()
      }

      function bindEvents() {
        boardEl.addEventListener('click', handleTileClick)
        document.getElementById('btn-new').addEventListener('click', newGame)
        document.getElementById('btn-shuffle').addEventListener('click', () => {
          shuffleRemaining()
          setStatus('已洗牌。')
        })
        document.getElementById('btn-hint').addEventListener('click', showHint)
        window.addEventListener('resize', () => {
          applyLayout()
          queueOverlaySync()
          clearPath()
        })
      }

      bindEvents()
      newGame()
    </script>
  </body>
</html>
